name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip npm publish (build only)'
        required: false
        default: 'false'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: native ${{ matrix.suffix }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Linux (x86_64) ---
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x64-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            suffix: linux-x64-musl

          # --- Linux (ARM / 交叉编译) ---
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64-gnu
            use_cross: true # Rolldown 方案：调用 NAPI-RS 容器化交叉编译
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            suffix: linux-arm64-musl
            use_zig: true # Rolldown 方案：ARM64 musl 同样通过 zigbuild 优雅搞定
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            suffix: linux-arm-gnueabihf
            use_cross: true # Rolldown 方案：32位 ARMv7 使用容器化快速交叉链接

          # --- macOS ---
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: darwin-arm64

          # --- Windows ---
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: win32-x64-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            suffix: win32-arm64-msvc
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Rolldown 核心提效点 1：若属于 musl 平台，自动就地安装高性能 Zig 编译器
      - uses: mlugg/setup-zig@v2
        if: ${{ matrix.use_zig }}
        with:
          version: 0.13.0

      # Rolldown 核心提效点 2：若属于 musl 平台，全局安装用于 Rust 的 cargo-zigbuild 工具链
      - uses: taiki-e/install-action@v2
        if: ${{ matrix.use_zig }}
        with:
          tool: cargo-zigbuild

      # ✨【新增步骤】如果是需要容器化交叉编译的平台，快速安装 cross 工具
      - uses: taiki-e/install-action@v2
        if: ${{ matrix.use_cross }}
        with:
          tool: cross

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build native module
        working-directory: crates/json_version_core
        shell: bash
        run: |
          ARGS=""

          # 流派 1：如果是 Docker 交叉编译
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            ARGS="--use-cross"
          fi

          # 流派 2：如果是 Zig 高性能编译 (Rolldown 标准解法)
          if [ "${{ matrix.use_zig }}" = "true" ]; then
            export CARGO_BUILD_TARGET_RUNNER=""

            # ✨ NAPI-RS 官方原生支持通过 --zig 参数来切换为使用 cargo-zigbuild 工具链
            ARGS="--zig"
          fi

          pnpm exec napi build \
            --target "$MATRIX_TARGET" \
            --platform \
            --release --strip --no-js \
            --output-dir . \
            $ARGS
        env:
          MATRIX_TARGET: ${{ matrix.target }}


      - name: Verify produced filename
        shell: bash
        working-directory: crates/json_version_core
        run: |
          expected="json-version-core.${{ matrix.suffix }}.node"
          if [ ! -s "$expected" ]; then
            echo "::error::missing or empty $expected, got:"
            ls -la *.node || true
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.suffix }}
          path: 'crates/json_version_core/*.node'
          if-no-files-found: error
          retention-days: 14

  publish-core:
    name: publish @frada/json-version-core
    needs: build
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.dry_run != 'true')
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org/'

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Create per-platform npm dirs
        working-directory: crates/json_version_core
        run: pnpm napi create-npm-dirs

      - name: Move binaries into npm/<triple>/
        working-directory: crates/json_version_core
        run: pnpm artifacts --output-dir ../../artifacts

      - name: Sanity-check layout before publish
        shell: bash
        run: |
          set -e
          # 同步补齐 9 个平台的校验，确保跨平台构件全部成功落位
          for s in linux-x64-gnu linux-x64-musl linux-arm64-gnu linux-arm64-musl linux-arm-gnueabihf darwin-x64 darwin-arm64 win32-x64-msvc win32-arm64-msvc; do
            f="crates/json_version_core/npm/$s/json-version-core.$s.node"
            if [ ! -s "$f" ]; then
              echo "::error::missing or empty $f. contents of npm/:"
              ls -la crates/json_version_core/npm || true
              exit 1
            fi
          done
          echo "ok: all nine native binaries staged under npm/"

      - name: Verify version matches tag
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -e
          v=$(jq -r .version crates/json_version_core/package.json)
          tag=${GITHUB_REF#refs/tags/v}
          if [ "$v" != "$tag" ]; then
            echo "::error::core version mismatch: package.json=$v, tag=$tag"
            exit 1
          fi
          echo "ok: publishing $v"

      - name: Verify npm auth
        run: npm whoami --registry=https://registry.npmjs.org/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @frada/json-version-core
        working-directory: crates/json_version_core
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-plugin:
    name: publish @frada/json-version-plugin
    needs: publish-core
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.dry_run != 'true')
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build JS/TS interface
        working-directory: packages/json-version-plugin
        run: pnpm build

      - name: Verify version matches tag
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -e
          v=$(jq -r .version packages/json-version-plugin/package.json)
          tag=${GITHUB_REF#refs/tags/v}
          if [ "$v" != "$tag" ]; then
            echo "::error::plugin version mismatch: package.json=$v, tag=$tag"
            exit 1
          fi
          echo "ok: publishing $v"

      - name: Verify npm auth
        run: npm whoami --registry=https://registry.npmjs.org/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @frada/json-version-plugin
        working-directory: packages/json-version-plugin
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
