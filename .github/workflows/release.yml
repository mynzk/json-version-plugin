name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip npm publish (build only)'
        required: false
        default: 'false'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: native ${{ matrix.suffix }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x64-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: win32-x64-msvc
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build native module
        working-directory: crates/json_version_core
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/napi-out/${{ matrix.suffix }}"
          pnpm exec napi build \
            --target "$MATRIX_TARGET" \
            --platform \
            --release --strip --no-js \
            --output-dir "$RUNNER_TEMP/napi-out/${{ matrix.suffix }}"
        env:
          MATRIX_TARGET: ${{ matrix.target }}

      - name: Verify produced filename
        shell: bash
        run: |
          expected="json-version-core.${{ matrix.suffix }}.node"
          f="$RUNNER_TEMP/napi-out/${{ matrix.suffix }}/$expected"
          if [ ! -s "$f" ]; then
            echo "::error::missing or empty $expected, got:"
            ls -la "$RUNNER_TEMP/napi-out/${{ matrix.suffix }}"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.suffix }}
          path: ${{ runner.temp }}/napi-out/${{ matrix.suffix }}/
          if-no-files-found: error
          retention-days: 14

  publish-core:
    name: publish @frada/json-version-core
    needs: build
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.dry_run != 'true')
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org/'

      - uses: actions/download-artifact@v4
        with:
          name: native-linux-x64-gnu
          path: crates/json_version_core/prebuilds
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: native-darwin-x64
          path: crates/json_version_core/prebuilds
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: native-darwin-arm64
          path: crates/json_version_core/prebuilds
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: native-win32-x64-msvc
          path: crates/json_version_core/prebuilds
          merge-multiple: true

      - name: Verify all four binaries present
        shell: bash
        run: |
          set -e
          for s in linux-x64-gnu darwin-x64 darwin-arm64 win32-x64-msvc; do
            f="crates/json_version_core/prebuilds/json-version-core.$s.node"
            if [ ! -s "$f" ]; then
              echo "::error::missing or empty $f. contents of prebuilds/:"
              ls -la crates/json_version_core/prebuilds || true
              exit 1
            fi
          done
          echo "ok: all four native binaries staged"

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Verify version matches tag
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -e
          v=$(jq -r .version crates/json_version_core/package.json)
          tag=${GITHUB_REF#refs/tags/v}
          if [ "$v" != "$tag" ]; then
            echo "::error::core version mismatch: package.json=$v, tag=$tag"
            exit 1
          fi
          echo "ok: publishing $v"

      - name: Verify npm auth
        run: npm whoami --registry=https://registry.npmjs.org/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # prepublishOnly runs `napi pre-publish -t npm --no-gh-release`,
      # bundling all four .node binaries into the published tarball.
      - name: Publish @frada/json-version-core
        working-directory: crates/json_version_core
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-plugin:
    name: publish @frada/json-version-plugin
    needs: publish-core
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.dry_run != 'true')
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org/'

      # Install AFTER publish-core so workspace:* resolves to the real version.
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build JS/TS interface
        working-directory: packages/json-version-plugin
        run: pnpm build

      - name: Verify version matches tag
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -e
          v=$(jq -r .version packages/json-version-plugin/package.json)
          tag=${GITHUB_REF#refs/tags/v}
          if [ "$v" != "$tag" ]; then
            echo "::error::plugin version mismatch: package.json=$v, tag=$tag"
            exit 1
          fi
          echo "ok: publishing $v"

      - name: Verify npm auth
        run: npm whoami --registry=https://registry.npmjs.org/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @frada/json-version-plugin
        working-directory: packages/json-version-plugin
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}