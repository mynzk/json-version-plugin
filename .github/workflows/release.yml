name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip npm publish (build only)'
        required: false
        default: 'false'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: native ${{ matrix.suffix }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x64-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: win32-x64-msvc
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build native module
        working-directory: crates/json_version_core
        shell: bash
        run: |
          pnpm exec napi build \
            --target "$MATRIX_TARGET" \
            --platform \
            --release --strip --no-js \
            --output-dir .
        env:
          MATRIX_TARGET: ${{ matrix.target }}

      - name: Verify produced filename
        shell: bash
        working-directory: crates/json_version_core
        run: |
          expected="json-version-core.${{ matrix.suffix }}.node"
          if [ ! -s "$expected" ]; then
            echo "::error::missing or empty $expected, got:"
            ls -la *.node || true
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.suffix }}
          # napi build --output-dir . drops binaries next to the crate, not at
          # the repo root — use the path relative to GITHUB_WORKSPACE.
          path: 'crates/json_version_core/*.node'
          if-no-files-found: error
          retention-days: 14

  publish-core:
    name: publish @frada/json-version-core
    needs: build
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.dry_run != 'true')
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org/'

      # Pulls every `native-*` artifact at once; each lands in its own
      # subdir under ./artifacts/. napi artifacts walks that tree when
      # populating npm/<triple>/ in a later step.
      - uses: actions/download-artifact@v4
        with: {}

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Create per-platform npm dirs
        working-directory: crates/json_version_core
        run: pnpm napi create-npm-dirs

      - name: Move binaries into npm/<triple>/
        working-directory: crates/json_version_core
        # actions/download-artifact@v4 (with empty `with: {}`) drops files at
        # $GITHUB_WORKSPACE/artifacts/<artifact-name>/, i.e. the repo root —
        # two levels above this step's cwd. napi artifacts joins --output-dir
        # onto its cwd via path.join (which does NOT short-circuit on absolute
        # paths), so the value must be relative. Default --output-dir is
        # ./artifacts, which would resolve to crates/json_version_core/artifacts
        # and ENOENT — that's the bug this overrides.
        run: pnpm artifacts --output-dir ../../artifacts

      - name: Sanity-check layout before publish
        shell: bash
        run: |
          set -e
          for s in linux-x64-gnu darwin-x64 darwin-arm64 win32-x64-msvc; do
            f="crates/json_version_core/npm/$s/json-version-core.$s.node"
            if [ ! -s "$f" ]; then
              echo "::error::missing or empty $f. contents of npm/:"
              ls -la crates/json_version_core/npm || true
              exit 1
            fi
          done
          echo "ok: all four native binaries staged under npm/"

      - name: Verify version matches tag
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -e
          v=$(jq -r .version crates/json_version_core/package.json)
          tag=${GITHUB_REF#refs/tags/v}
          if [ "$v" != "$tag" ]; then
            echo "::error::core version mismatch: package.json=$v, tag=$tag"
            exit 1
          fi
          echo "ok: publishing $v"

      - name: Verify npm auth
        run: npm whoami --registry=https://registry.npmjs.org/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # prepublishOnly (napi pre-publish -t npm --no-gh-release) runs first
      # inside this pnpm publish. It publishes the four satellite packages
      # and merges optionalDependencies into the root package.json. Then the
      # pnpm publish itself publishes the root @frada/json-version-core.
      - name: Publish @frada/json-version-core
        working-directory: crates/json_version_core
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-plugin:
    name: publish @frada/json-version-plugin
    needs: publish-core
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.dry_run != 'true')
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org/'

      # Install AFTER publish-core so workspace:* resolves to the real version.
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build JS/TS interface
        working-directory: packages/json-version-plugin
        run: pnpm build

      - name: Verify version matches tag
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -e
          v=$(jq -r .version packages/json-version-plugin/package.json)
          tag=${GITHUB_REF#refs/tags/v}
          if [ "$v" != "$tag" ]; then
            echo "::error::plugin version mismatch: package.json=$v, tag=$tag"
            exit 1
          fi
          echo "ok: publishing $v"

      - name: Verify npm auth
        run: npm whoami --registry=https://registry.npmjs.org/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @frada/json-version-plugin
        working-directory: packages/json-version-plugin
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}